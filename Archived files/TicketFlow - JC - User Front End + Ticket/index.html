<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketFlow - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-wrapper">
        
        <div class="logo-container">
            <img src="TicketFlow.png" alt="TicketFlow Logo">
        </div>

        <div class="login-box">
            <form onsubmit="event.preventDefault(); localStorage.setItem('ticketflow_user', document.getElementById('username').value); window.location.href='portal.html';">
                <div class="input-group">
                    <label for="username">User Name</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>
        </div>
        
    </div>

</body>
</html>
