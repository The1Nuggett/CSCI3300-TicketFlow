<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketFlow | User Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="view-header">
            <div>
                <p class="eyebrow">TicketFlow</p>
                <h1>User Ticket Portal</h1>
                <p class="header-description">Create requests and follow updates from the support team.</p>
            </div>
        </header>

        <section class="card">
            <h2>Create Support Ticket</h2>

            <form id="ticketForm">
                <div class="form-field">
                    <label for="requesterName">Name</label>
                    <input type="text" id="requesterName" autocomplete="name" required>
                </div>

                <div class="form-field">
                    <label for="requesterEmail">Email</label>
                    <input type="email" id="requesterEmail" autocomplete="email" required>
                </div>

                <div class="form-field field-wide">
                    <label for="title">Title</label>
                    <input type="text" id="title" required>
                </div>

                <div class="form-field field-wide">
                    <label for="description">Description / Notes</label>
                    <textarea id="description" required></textarea>
                </div>

                <div class="form-field">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select category</option>
                        <option value="Hardware">Hardware</option>
                        <option value="Software">Software</option>
                        <option value="User Access">User Access</option>
                        <option value="Network">Network</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="department">Department (Optional)</label>
                    <input type="text" id="department">
                </div>

                <div class="form-field">
                    <label for="priority">Priority (Optional)</label>
                    <select id="priority">
                        <option value="">Select priority</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="expectedDate">Expected Resolution Date (Optional)</label>
                    <input type="date" id="expectedDate">
                </div>

                <button type="submit">Submit Ticket</button>
            </form>
        </section>

        <section class="card">
            <h2>My Tickets</h2>
            <p>Choose a ticket to see its current status and technician updates.</p>
            <div id="ticketList"></div>
        </section>
    </main>

    <script src="Ticket.js"></script>
    <script src="Create.js"></script>
</body>
</html>
